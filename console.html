<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marst DataBase - Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #eee; display: flex; flex-direction: column; height: 100vh; }
        nav {
            background: #1a1a2e;
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        nav .left { display: flex; align-items: center; gap: 1rem; }
        nav h1 { color: #00ff88; font-size: 1rem; }
        nav .project-name { color: #eee; font-size: 0.95rem; }
        nav .back { color: #888; font-size: 0.85rem; cursor: pointer; text-decoration: none; }
        nav .back:hover { color: #00ff88; }
        nav button { background: #ff4444; color: white; border: none; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }

        .main { display: flex; flex: 1; overflow: hidden; }

        /* 왼쪽 메뉴 */
        .sidemenu {
            width: 200px;
            background: #13131f;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }
        .sidemenu-item {
            padding: 0.9rem 1.2rem;
            cursor: pointer;
            color: #888;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .sidemenu-item:hover { background: #1a1a2e; color: #eee; }
        .sidemenu-item.active { background: #1a1a2e; color: #00ff88; border-left-color: #00ff88; }

        /* 콘텐츠 */
        .content { flex: 1; display: flex; overflow: hidden; }

        /* DB 뷰 */
        .db-sidebar {
            width: 220px;
            background: #1a1a1a;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }
        .db-sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
        }
        .add-col-btn {
            background: #00ff88;
            color: #111;
            border: none;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .col-list { flex: 1; overflow-y: auto; }
        .col-item {
            padding: 0.7rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: #888;
            border-left: 3px solid transparent;
        }
        .col-item:hover { background: #222; color: #eee; }
        .col-item.active { background: #222; color: #00ff88; border-left-color: #00ff88; }

        .doc-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .doc-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .doc-header h3 { font-size: 0.95rem; color: #00ff88; }
        .add-doc-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .doc-list { flex: 1; overflow-y: auto; padding: 1rem; }
        .doc-item {
            background: #1e1e2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.7rem;
            display: flex;
            justify-content: space-between;
        }
        .doc-item:hover { border-color: #444; }
        .doc-id { color: #00ff88; font-size: 0.72rem; font-family: monospace; margin-bottom: 0.4rem; }
        .doc-data { font-family: monospace; font-size: 0.82rem; color: #bbb; white-space: pre-wrap; }
        .doc-del { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.72rem; flex-shrink: 0; margin-left: 1rem; }

        /* API 키 뷰 */
        .apikey-view { padding: 2rem; flex: 1; overflow-y: auto; }
        .apikey-view h2 { color: #00ff88; margin-bottom: 1.5rem; }
        .key-box {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .key-box label { color: #888; font-size: 0.8rem; display: block; margin-bottom: 0.5rem; }
        .key-value { font-family: monospace; color: #00ff88; font-size: 0.9rem; word-break: break-all; }
        .copy-btn { background: #333; color: #eee; border: none; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-top: 0.8rem; }
        .sdk-box {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 1.5rem;
            font-family: monospace;
            font-size: 0.82rem;
            color: #bbb;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* 모달 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.show { display: flex; }
        .modal { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; width: 380px; }
        .modal h3 { color: #00ff88; margin-bottom: 1rem; }
        .modal input, .modal textarea { width: 100%; background: #111; border: 1px solid #333; color: #eee; padding: 0.7rem; border-radius: 6px; margin-bottom: 0.8rem; font-size: 0.9rem; }
        .modal textarea { height: 140px; font-family: monospace; resize: vertical; }
        .modal-btns { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .btn-cancel { background: #333; color: #eee; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .btn-save { background: #00ff88; color: #111; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .empty { color: #555; text-align: center; padding: 3rem; font-size: 0.9rem; }
        .page { display: none; }
        .page.active { display: flex; flex: 1; overflow: hidden; }
    </style>
</head>
<body>
<nav>
    <div class="left">
        <a class="back" href="index.html">← 프로젝트</a>
        <h1>⚡</h1>
        <span class="project-name" id="project-name-nav">로딩 중...</span>
    </div>
    <button onclick="logout()">로그아웃</button>
</nav>

<div class="main">
    <!-- 왼쪽 메뉴 -->
    <div class="sidemenu">
        <div class="sidemenu-item active" onclick="showPage('db')">🗄️ Database</div>
        <div class="sidemenu-item" onclick="showPage('apikey')">🔑 API 키</div>
    </div>

    <!-- DB 페이지 -->
    <div class="page active" id="page-db">
        <div class="db-sidebar">
            <div class="db-sidebar-header">
                <span>컬렉션</span>
                <button class="add-col-btn" onclick="showAddCol()">+</button>
            </div>
            <div class="col-list" id="col-list">
                <div class="empty">없음</div>
            </div>
        </div>
        <div class="doc-area">
            <div class="doc-header">
                <h3 id="current-col-name">컬렉션 선택</h3>
                <button class="add-doc-btn" id="add-doc-btn" style="display:none" onclick="showAddDoc()">+ 문서 추가</button>
            </div>
            <div class="doc-list" id="doc-list">
                <div class="empty">왼쪽에서 컬렉션을 선택하세요</div>
            </div>
        </div>
    </div>

    <!-- API 키 페이지 -->
    <div class="page" id="page-apikey">
        <div class="apikey-view">
            <h2>🔑 API 키</h2>
            <div class="key-box">
                <label>프로젝트 API 키</label>
                <div class="key-value" id="apikey-value">로딩 중...</div>
                <button class="copy-btn" onclick="copyKey()">복사</button>
            </div>
            <div class="key-box">
                <label>SDK 사용 예시</label>
                <div class="sdk-box" id="sdk-example"></div>
            </div>
        </div>
    </div>
</div>

<!-- 컬렉션 추가 모달 -->
<div class="modal-overlay" id="col-modal">
    <div class="modal">
        <h3>새 컬렉션</h3>
        <input type="text" id="new-col-name" placeholder="컬렉션 이름 (예: posts)" />
        <div class="modal-btns">
            <button class="btn-cancel" onclick="hideModal('col-modal')">취소</button>
            <button class="btn-save" onclick="addCol()">생성</button>
        </div>
    </div>
</div>

<!-- 문서 추가 모달 -->
<div class="modal-overlay" id="doc-modal">
    <div class="modal">
        <h3>새 문서</h3>
        <textarea id="new-doc-data" placeholder='{"key": "value"}'></textarea>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="hideModal('doc-modal')">취소</button>
            <button class="btn-save" onclick="addDoc()">저장</button>
        </div>
    </div>
</div>

<script>
    const API = 'https://marst-database.onrender.com';
    if (!localStorage.getItem('marst_token')) window.location.href = 'login.html';

    const apiKey = localStorage.getItem('current_api_key');
    const projectId = localStorage.getItem('current_project_id');
    let currentCol = null;

    window.onload = async () => {
        // 프로젝트 이름 표시
        const projects = await fetch(`${API}/api/projects`, {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('marst_token')}` }
        }).then(r => r.json());
        const project = projects.find(p => p.id == projectId);
        if (project) document.getElementById('project-name-nav').textContent = project.name;

        // API 키 표시
        document.getElementById('apikey-value').textContent = apiKey;
        document.getElementById('sdk-example').textContent =
`<script src="https://marstaiwebstudio.github.io/marst-database/sdk.js"><\/script>

const app = MarstDB.init({ apiKey: '${apiKey}' });

// DB 저장
await app.db.set('posts', { title: '안녕' });

// DB 조회
const posts = await app.db.get('posts');

// DB 삭제
await app.db.delete('posts', 'DOC_ID');`;

        loadCollections();
    };

    function showPage(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sidemenu-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`page-${name}`).classList.add('active');
        event.target.classList.add('active');
    }

    async function loadCollections() {
        const res = await fetch(`${API}/api/db`, {
            headers: { 'X-API-Key': apiKey }
        });
        const cols = await res.json();
        const list = document.getElementById('col-list');
        if (!cols.length) { list.innerHTML = '<div class="empty">컬렉션 없음</div>'; return; }
        list.innerHTML = cols.map(c => `
            <div class="col-item" id="col-${c.name}" onclick="selectCol('${c.name}')">📁 ${c.name}</div>
        `).join('');
    }

    async function selectCol(name) {
        currentCol = name;
        document.querySelectorAll('.col-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`col-${name}`)?.classList.add('active');
        document.getElementById('current-col-name').textContent = `📁 ${name}`;
        document.getElementById('add-doc-btn').style.display = 'block';
        loadDocs(name);
    }

    async function loadDocs(name) {
        const docs = await fetch(`${API}/api/db/${name}`, {
            headers: { 'X-API-Key': apiKey }
        }).then(r => r.json());
        const list = document.getElementById('doc-list');
        if (!docs.length) { list.innerHTML = '<div class="empty">문서 없음</div>'; return; }
        list.innerHTML = docs.map(d => `
            <div class="doc-item">
                <div>
                    <div class="doc-id">ID: ${d.id}</div>
                    <div class="doc-data">${JSON.stringify(d.data, null, 2)}</div>
                </div>
                <button class="doc-del" onclick="deleteDoc('${d.id}')">삭제</button>
            </div>
        `).join('');
    }

    async function deleteDoc(id) {
        if (!confirm('삭제할까요?')) return;
        await fetch(`${API}/api/db/${currentCol}/${id}`, {
            method: 'DELETE',
            headers: { 'X-API-Key': apiKey }
        });
        loadDocs(currentCol);
    }

    function showAddCol() { document.getElementById('col-modal').classList.add('show'); }
    function showAddDoc() { document.getElementById('doc-modal').classList.add('show'); }
    function hideModal(id) { document.getElementById(id).classList.remove('show'); }

    async function addCol() {
        const name = document.getElementById('new-col-name').value.trim();
        if (!name) return;
        await fetch(`${API}/api/db/${name}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
            body: JSON.stringify({ _init: true })
        });
        hideModal('col-modal');
        await loadCollections();
        selectCol(name);
    }

    async function addDoc() {
        const dataStr = document.getElementById('new-doc-data').value;
        try {
            const data = JSON.parse(dataStr);
            await fetch(`${API}/api/db/${currentCol}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
                body: JSON.stringify(data)
            });
            hideModal('doc-modal');
            loadDocs(currentCol);
        } catch (e) { alert('JSON 형식이 올바르지 않아요!'); }
    }

    function copyKey() {
        navigator.clipboard.writeText(apiKey);
        alert('복사됐어요!');
    }

    function logout() {
        localStorage.removeItem('marst_token');
        localStorage.removeItem('marst_user');
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
